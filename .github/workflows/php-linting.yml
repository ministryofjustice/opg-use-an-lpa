name: "PHP Linting with Code Sniffer"
on:
  pull_request:
    paths:
      - "**.php"
      - "**/app/phpcs.xml.dist"
      - ".github/workflows/php-linting.yml"

permissions:
  actions: read
  checks: read
  contents: none
  deployments: none
  issues: none
  packages: none
  pull-requests: write
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  phpcs:
    name: Lint PHP
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_path: [ 'service-front', 'service-api' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: Setup PHP with tools
      uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a # 2.33.0
      with:
        php-version: '8.3'

    - name: Install and configure phpcs
      run: |
        export install_dir=$HOME/.composer/vendor
        composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
        composer global require --no-interaction squizlabs/php_codesniffer:4.0.1 slevomat/coding-standard:8.25.1
        phpcs --version
        phpcs -i

    - name: Detect changed PHP files
      run: |
        {
          echo "CHANGED_PHP_FILES<<EOF"
          git diff --name-only origin/main... -- '${{ matrix.service_path }}/**/*.php'
          echo "EOF"
        } >> "$GITHUB_ENV"

    - name: Run phpcs
      if: env.CHANGED_PHP_FILES != ''
      run: |
        echo "::add-matcher::.github/phpcs-problem-matcher.json"
        phpcs --standard=${{ matrix.service_path }}/app/phpcs.xml.dist --basepath="$GITHUB_WORKSPACE" --report-xml --report-full $CHANGED_PHP_FILES
