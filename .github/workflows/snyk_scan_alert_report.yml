name: "[Snyk] scan alert report"

defaults:
  run:
    shell: bash

on:
  schedule:
    - cron: 30 10 * * 1-5

jobs:
  snyk_scan_alert_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.24"
          python-version: "3.14"

      - name: Install dependencies
        working-directory: scripts/pipeline/generate_snyk_report
        run: uv sync --locked

      - name: send report to slack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.PROD_SLACK_WEB_HOOK }}
        run: |
          uv run --project scripts/pipeline/generate_snyk_report scripts/pipeline/generate_snyk_report/code_scan_report.py
